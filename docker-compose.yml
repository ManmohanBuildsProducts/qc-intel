services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data        # SQLite persistence
      - ./src:/app/src          # Live reload in dev (remove in prod)
      - ./api:/app/api
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - QC_DB_PATH=/app/data/qc_intel.db
      - QC_ALLOWED_ORIGINS=${QC_ALLOWED_ORIGINS:-http://localhost:3000}
    restart: unless-stopped

  scheduler:
    build: .
    command: python scripts/scheduler.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - QC_DB_PATH=/app/data/qc_intel.db
    restart: unless-stopped
    depends_on:
      - api

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm i -g pnpm && pnpm install && pnpm dev"
    ports:
      - "3000:3000"
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    profiles:
      - full  # opt-in: docker compose --profile full up
